services:
  postgres:
    image: postgres:16-alpine
    container_name: stockini-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockpro
      POSTGRES_USER: stockpro
      POSTGRES_PASSWORD: stockpro_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stockpro -d stockpro']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockini-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://stockpro:stockpro_password@postgres:5432/stockpro?schema=public
      JWT_SECRET: change_me
      JWT_REFRESH_SECRET: change_me_refresh
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3001
      APP_NAME: Stockini
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockini-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      APP_NAME: Stockini
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
