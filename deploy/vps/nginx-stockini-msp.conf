# =============================================================
# Stockini MSP — Nginx Configuration (VPS)
# =============================================================
# Copy to: /etc/nginx/sites-available/stockini-msp.tn
# Enable:  sudo ln -sf /etc/nginx/sites-available/stockini-msp.tn /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
# =============================================================

# ── Rate Limiting ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=global:10m   rate=20r/s;
limit_req_zone $binary_remote_addr zone=login:10m    rate=1r/s;
limit_req_zone $binary_remote_addr zone=api:10m      rate=30r/s;

# ── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    server_name stockini-msp.tn www.stockini-msp.tn;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://stockini-msp.tn$request_uri;
    }
}

# ── Main HTTPS server ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name stockini-msp.tn www.stockini-msp.tn;

    # ── SSL ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/stockini-msp.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stockini-msp.tn/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag             "noindex, nofollow, nosnippet, noarchive" always;
    # CSP is emitted by Next.js middleware with a per-request script nonce.
    # Keeping a static proxy CSP here would block nonce-protected Next scripts
    # or require unsafe-inline/unsafe-eval in production.

    server_tokens off;

    # ── Global rate limit ───────────────────────────────────
    limit_req zone=global burst=40 nodelay;

    # ── Robots.txt — block crawlers ─────────────────────────
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # ── Block scanner paths ─────────────────────────────────
    location ~* ^/(\.env|\.git|wp-admin|wp-login|phpmyadmin|xmlrpc\.php) {
        return 444;
    }

    # ── Backend API → NestJS (PM2 on port 3001) ─────────────
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    300;
        proxy_connect_timeout 300;
        client_max_body_size  50M;
    }

    # ── WebSockets (Socket.IO) ──────────────────────────────
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 86400; # Keep WS connection alive
        proxy_send_timeout 86400;
    }

    # ── Login — strict rate limit ───────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass         http://127.0.0.1:3001/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 1M;
    }

    # ── Password reset — strict rate limit ──────────────────
    location /api/auth/forgot-password {
        limit_req zone=login burst=5 nodelay;

        proxy_pass         http://127.0.0.1:3001/api/auth/forgot-password;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        client_max_body_size 1M;
    }

    # ── Frontend Next.js (PM2 on port 3000) ─────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300;
    }

    autoindex off;
}
